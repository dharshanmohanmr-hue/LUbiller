<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL UP - Premium Social Growth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.2);
            --danger: #ef4444;
            --glass-blur: blur(16px);
        }

        .light-mode {
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --accent: #059669;
            --accent-glow: rgba(5, 150, 105, 0.15);
            --danger: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, var(--primary), #ec4899);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .light-mode .logo-text {
            background: linear-gradient(to right, #0f172a, #475569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle, .cart-icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .hero {
            text-align: center;
            padding: 40px 20px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .free-offer-container {
            background: rgba(16, 185, 129, 0.1);
            border: 1px dashed var(--accent);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: var(--glass-blur);
            text-align: center;
        }

        .free-offer-title {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .free-options {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .free-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .free-btn.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .pricing-sections {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .service-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #a855f7);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .service-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--primary-glow);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .service-title h3 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .service-title p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .selector-group {
            margin-bottom: 20px;
        }

        .range-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .counter-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.15);
            border-radius: 14px;
            padding: 6px;
            border: 1px solid var(--card-border);
        }
        .light-mode .counter-control {
            background: rgba(0,0,0,0.04);
        }

        .counter-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:hover {
            background: var(--primary);
            color: white;
        }

        .counter-value {
            font-weight: 700;
            font-size: 1.15rem;
            width: 80px;
            text-align: center;
        }

        .select-dropdown {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            font-weight: 600;
            outline: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .price-display {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 20px 0;
            padding-top: 15px;
            border-top: 1px dashed var(--card-border);
        }

        .price-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .price-amount {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
        }

        .add-to-cart-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-to-cart-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 99;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .light-mode .cart-bar {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .cart-bar.active {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .cart-bar-info h4 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .cart-bar-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .checkout-trigger-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            width: 90%;
            max-width: 500px;
            border-radius: 24px;
            padding: 30px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
        }

        .input-field {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            outline: none;
        }
        .light-mode .input-field {
            background: rgba(0,0,0,0.03);
        }

        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .pay-method-card {
            border: 2px solid var(--card-border);
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .pay-method-card.selected {
            border-color: var(--primary);
            background: var(--primary-glow);
        }

        .tab-navigation {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .view-pane {
            display: none;
        }

        .view-pane.active {
            display: block;
        }

        .invoice-box {
            background: #ffffff;
            color: #0f172a;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .invoice-title {
            text-align: right;
        }

        .invoice-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 10px;
        }

        .invoice-items {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .invoice-items th {
            text-align: left;
            padding: 8px;
            background: #f1f5f9;
            font-size: 0.85rem;
        }

        .invoice-items td {
            padding: 10px 8px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.9rem;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
            color: #0f172a;
        }

        .qr-isolation-block {
            padding: 15px;
            background: #ffffff;
            border-radius: 12px;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }

        .qr-wrapper {
            position: relative;
            background: white;
            display: inline-block;
        }

        .qr-logo-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 34px;
            height: 34px;
            background: linear-gradient(45deg, #6366f1, #ec4899);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 0.75rem;
            border: 2px solid white;
            z-index: 5;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        /* --- TWO-COLUMN HISTORY SPLIT WORKSPACE ARCHITECTURE --- */
        .history-container-block {
            max-width: 1200px;
            margin: 20px auto 0;
            padding: 20px;
            display: none; /* Hidden by Default */
        }

        .history-container-block.show {
            display: block; /* Shown when triggered */
        }

        .history-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .history-split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .history-column-pane {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: var(--glass-blur);
        }

        .column-header-title {
